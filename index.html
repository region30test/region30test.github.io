<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Tools</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
<nav>
    <a href="#" data-page="home">Home</a>
    <a href="#" data-page="generate">Generate Email</a>
    <a href="#" data-page="amortization">Amortization Schedule</a>
</nav>
<div id="content">
    <!-- Page content loads here -->
</div>
<footer>
    © 2026 Brodie Brenna | Internal Use Only
</footer>
<script>
    async function loadPage(pageName) {
        const contentDiv = document.getElementById("content");

        // Remove any previously loaded page script
        const oldScript = document.getElementById("page-script");
        if (oldScript) oldScript.remove();

        try {
            const res = await fetch(`${pageName}.html?v=${Date.now()}`);
            if (!res.ok) throw new Error("Not found");
            const html = await res.text();
            contentDiv.innerHTML = html;

            // Load the corresponding JS file if it exists
            const script = document.createElement("script");
            script.src = `${pageName}.js?v=${Date.now()}`;
            script.id = "page-script";
            script.onerror = () => console.warn(`No JS file for: ${pageName}`);
            document.body.appendChild(script);
        } catch (err) {
            contentDiv.innerHTML = "<p>Page not found.</p>";
            console.error(err);
        }
    }

    // Nav click handling
    document.querySelectorAll("nav a").forEach(link => {
        link.addEventListener("click", e => {
            e.preventDefault();
            loadPage(link.dataset.page);
        });
    });

    // On load, check for ?page= param (handles 404 redirects and direct links)
    const params = new URLSearchParams(window.location.search);
    const startPage = params.get("page") || "home";
    loadPage(startPage);
</script>
</body>
</html>
