<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Tools</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
    <a href="#" data-page="home">Home</a>
    <a href="#" data-page="generate">Generate Email</a>
    <a href="#" data-page="amortization">Amortization Schedule</a>
</nav>

<div id="content">
    <!-- Page content loads here -->
</div>

<script>
async function loadPage(pageName) {
    const contentDiv = document.getElementById("content");

    // Clear previous scripts
    const oldScript = document.getElementById("page-script");
    if (oldScript) oldScript.remove();

    try {
        const res = await fetch(`${pageName}.html?v=${Date.now()}`);
        const html = await res.text();
        contentDiv.innerHTML = html;

        // Load corresponding JS file
        const script = document.createElement("script");
        script.src = `${pageName}.js?v=${Date.now()}`;
        script.id = "page-script";
        document.body.appendChild(script);

    } catch (err) {
        contentDiv.innerHTML = "<h2>Page not found</h2>";
    }
}

// Navigation handling
document.querySelectorAll("nav a").forEach(link => {
    link.addEventListener("click", e => {
        e.preventDefault();
        loadPage(link.dataset.page);
    });
});

// Default page
loadPage("home");
</script>

</body>

</html>
